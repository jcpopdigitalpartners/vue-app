name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      assessment_api_url:
        description: Railway API base URL (e.g. https://xxx.up.railway.app/api)
        required: false
        type: string
      assessment_provider:
        description: Assessment provider (api or heuristic)
        required: false
        default: api
        type: choice
        options:
          - api
          - heuristic

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_ASSESSMENT_PROVIDER: ${{ inputs.assessment_provider || vars.VITE_ASSESSMENT_PROVIDER || secrets.VITE_ASSESSMENT_PROVIDER || 'api' }}
          VITE_ASSESSMENT_API_URL: ${{ inputs.assessment_api_url || vars.VITE_ASSESSMENT_API_URL || secrets.VITE_ASSESSMENT_API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
